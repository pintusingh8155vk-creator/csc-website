services:
  - type: web
    name: cybercafe-erp
    env: python
    plan: free
    buildCommand: |
      pip install -r requirements.txt
      flask db upgrade
    startCommand: |
      gunicorn app:app
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: FLASK_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: cybercafe-erp-db
          property: connectionString

databases:
  - name: cybercafe-erp-db
    databaseName: cybercafe_erp
    user: cybercafe_user
    plan: free