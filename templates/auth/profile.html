{% extends 'base.html' %}

{% block title %}Profile - CyberCafe ERP{% endblock %}
{% block page_title %}My Profile{% endblock %}

{% block content %}
<div class="max-w-4xl mx-auto">
    <div class="bg-white rounded-lg card-shadow p-8">
        <h2 class="text-3xl font-bold mb-8">Profile Information</h2>
        
        <form method="POST" class="space-y-6">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-2">Full Name</label>
                    <input type="text" name="full_name" value="{{ user.full_name }}" class="w-full px-4 py-2 border border-gray-300 rounded focus:outline-none focus:ring-2 focus:ring-blue-600">
                </div>
                
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-2">Shop Name (Read-only)</label>
                    <input type="text" value="{{ user.shop_name }}" disabled class="w-full px-4 py-2 border border-gray-300 rounded bg-gray-100">
                </div>
                
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-2">Email (Read-only)</label>
                    <input type="email" value="{{ user.email }}" disabled class="w-full px-4 py-2 border border-gray-300 rounded bg-gray-100">
                </div>
                
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-2">Mobile (Read-only)</label>
                    <input type="tel" value="{{ user.mobile_number }}" disabled class="w-full px-4 py-2 border border-gray-300 rounded bg-gray-100">
                </div>
                
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-2">District</label>
                    <input type="text" name="district" value="{{ user.district or '' }}" class="w-full px-4 py-2 border border-gray-300 rounded focus:outline-none focus:ring-2 focus:ring-blue-600">
                </div>
                
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-2">Member Since</label>
                    <input type="text" value="{{ user.created_at.strftime('%d %b %Y') }}" disabled class="w-full px-4 py-2 border border-gray-300 rounded bg-gray-100">
                </div>
            </div>
            
            <div>
                <label class="block text-sm font-bold text-gray-700 mb-2">Address</label>
                <textarea name="address" rows="4" class="w-full px-4 py-2 border border-gray-300 rounded focus:outline-none focus:ring-2 focus:ring-blue-600">{{ user.address or '' }}</textarea>
            </div>
            
            <button type="submit" class="px-6 py-2 bg-blue-600 text-white rounded font-bold hover:bg-blue-700 transition">
                Update Profile
            </button>
        </form>
    </div>
</div>
{% endblock %}
