{% extends 'base.html' %}

{% block title %}Login - CyberCafe ERP{% endblock %}
{% block page_title %}Login{% endblock %}

{% block content %}
<div class="flex items-center justify-center min-h-screen bg-gray-100">
    <div class="bg-white rounded-lg card-shadow p-8 w-full max-w-md">
        <h2 class="text-3xl font-bold text-center mb-8 text-blue-600">Welcome Back</h2>
        
        <form method="POST" class="space-y-6">
            <div>
                <label class="block text-sm font-bold text-gray-700 mb-2">Email Address</label>
                <input type="email" name="email" required class="w-full px-4 py-2 border border-gray-300 rounded focus:outline-none focus:ring-2 focus:ring-blue-600" placeholder="your@email.com">
            </div>
            
            <div>
                <label class="block text-sm font-bold text-gray-700 mb-2">Password</label>
                <input type="password" name="password" required class="w-full px-4 py-2 border border-gray-300 rounded focus:outline-none focus:ring-2 focus:ring-blue-600" placeholder="••••••">
            </div>
            
            <div class="flex items-center">
                <input type="checkbox" name="remember" id="remember" class="mr-2">
                <label for="remember" class="text-sm text-gray-600">Remember me</label>
            </div>
            
            <button type="submit" class="w-full py-2 px-4 bg-blue-600 text-white rounded font-bold hover:bg-blue-700 transition">
                Login
            </button>
        </form>
        
        <p class="text-center text-gray-600 mt-6">
            Don't have an account? <a href="{{ url_for('auth.register') }}" class="text-blue-600 font-bold hover:underline">Register here</a>
        </p>
    </div>
</div>
{% endblock %}
