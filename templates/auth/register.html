{% extends 'base.html' %}

{% block title %}Register - CyberCafe ERP{% endblock %}
{% block page_title %}Register{% endblock %}

{% block content %}
<div class="flex items-center justify-center min-h-screen bg-gray-100 py-8">
    <div class="bg-white rounded-lg card-shadow p-8 w-full max-w-md">
        <h2 class="text-3xl font-bold text-center mb-8 text-blue-600">Create Account</h2>
        
        <form method="POST" class="space-y-4">
            <div>
                <label class="block text-sm font-bold text-gray-700 mb-2">Full Name</label>
                <input type="text" name="full_name" required class="w-full px-4 py-2 border border-gray-300 rounded focus:outline-none focus:ring-2 focus:ring-blue-600" placeholder="Your Name">
            </div>
            
            <div>
                <label class="block text-sm font-bold text-gray-700 mb-2">Shop Name</label>
                <input type="text" name="shop_name" required class="w-full px-4 py-2 border border-gray-300 rounded focus:outline-none focus:ring-2 focus:ring-blue-600" placeholder="Your Cyber Cafe Name">
            </div>
            
            <div>
                <label class="block text-sm font-bold text-gray-700 mb-2">Mobile Number</label>
                <input type="tel" name="mobile_number" required pattern="[6-9][0-9]{9}" class="w-full px-4 py-2 border border-gray-300 rounded focus:outline-none focus:ring-2 focus:ring-blue-600" placeholder="10 digit mobile">
            </div>
            
            <div>
                <label class="block text-sm font-bold text-gray-700 mb-2">Email Address</label>
                <input type="email" name="email" required class="w-full px-4 py-2 border border-gray-300 rounded focus:outline-none focus:ring-2 focus:ring-blue-600" placeholder="your@email.com">
            </div>
            
            <div>
                <label class="block text-sm font-bold text-gray-700 mb-2">District</label>
                <input type="text" name="district" class="w-full px-4 py-2 border border-gray-300 rounded focus:outline-none focus:ring-2 focus:ring-blue-600" placeholder="Your District">
            </div>
            
            <div>
                <label class="block text-sm font-bold text-gray-700 mb-2">Address</label>
                <textarea name="address" rows="2" class="w-full px-4 py-2 border border-gray-300 rounded focus:outline-none focus:ring-2 focus:ring-blue-600" placeholder="Your Address"></textarea>
            </div>
            
            <div>
                <label class="block text-sm font-bold text-gray-700 mb-2">Password</label>
                <input type="password" name="password" required minlength="6" class="w-full px-4 py-2 border border-gray-300 rounded focus:outline-none focus:ring-2 focus:ring-blue-600" placeholder="••••••">
            </div>
            
            <div>
                <label class="block text-sm font-bold text-gray-700 mb-2">Confirm Password</label>
                <input type="password" name="confirm_password" required minlength="6" class="w-full px-4 py-2 border border-gray-300 rounded focus:outline-none focus:ring-2 focus:ring-blue-600" placeholder="••••••">
            </div>
            
            <button type="submit" class="w-full py-2 px-4 bg-blue-600 text-white rounded font-bold hover:bg-blue-700 transition">
                Create Account
            </button>
        </form>
        
        <p class="text-center text-gray-600 mt-6">
            Already have an account? <a href="{{ url_for('auth.login') }}" class="text-blue-600 font-bold hover:underline">Login here</a>
        </p>
    </div>
</div>
{% endblock %}
