{% extends 'base.html' %}

{% block title %}Create Service - CyberCafe ERP{% endblock %}
{% block page_title %}Create New Service{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto">
    <div class="bg-white rounded-lg card-shadow p-8">
        <form method="POST" class="space-y-6">
            <div>
                <label class="block text-sm font-bold text-gray-700 mb-2">Customer *</label>
                <select name="customer_id" required class="w-full px-4 py-2 border border-gray-300 rounded focus:outline-none focus:ring-2 focus:ring-blue-600">
                    <option value="">Select a customer</option>
                    {% for customer in customers %}
                        <option value="{{ customer.id }}">{{ customer.full_name }} - {{ customer.mobile_number or 'N/A' }}</option>
                    {% endfor %}
                </select>
            </div>
            
            <div>
                <label class="block text-sm font-bold text-gray-700 mb-2">Service Type *</label>
                <input type="text" name="service_type" required class="w-full px-4 py-2 border border-gray-300 rounded focus:outline-none focus:ring-2 focus:ring-blue-600" placeholder="e.g., Printing, Typing, Data Entry">
            </div>
            
            <div>
                <label class="block text-sm font-bold text-gray-700 mb-2">Amount *</label>
                <input type="number" name="amount" step="0.01" min="0" required class="w-full px-4 py-2 border border-gray-300 rounded focus:outline-none focus:ring-2 focus:ring-blue-600" placeholder="0.00">
            </div>
            
            <div>
                <label class="block text-sm font-bold text-gray-700 mb-2">Notes</label>
                <textarea name="notes" rows="4" class="w-full px-4 py-2 border border-gray-300 rounded focus:outline-none focus:ring-2 focus:ring-blue-600" placeholder="Additional notes"></textarea>
            </div>
            
            <div class="flex gap-4">
                <button type="submit" class="px-6 py-2 bg-blue-600 text-white rounded font-bold hover:bg-blue-700 transition">
                    Create Service
                </button>
                <a href="{{ url_for('service.list_services') }}" class="px-6 py-2 bg-gray-600 text-white rounded font-bold hover:bg-gray-700 transition">
                    Cancel
                </a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
