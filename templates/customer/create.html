{% extends 'base.html' %}

{% block title %}Add Customer - CyberCafe ERP{% endblock %}
{% block page_title %}Add New Customer{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto">
    <div class="bg-white rounded-lg card-shadow p-8">
        <form method="POST" class="space-y-6">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-2">Full Name *</label>
                    <input type="text" name="full_name" required class="w-full px-4 py-2 border border-gray-300 rounded focus:outline-none focus:ring-2 focus:ring-blue-600" placeholder="Customer Name">
                </div>
                
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-2">Mobile Number</label>
                    <input type="tel" name="mobile_number" class="w-full px-4 py-2 border border-gray-300 rounded focus:outline-none focus:ring-2 focus:ring-blue-600" placeholder="10 digit mobile">
                </div>
                
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-2">Aadhaar Last 4 Digits</label>
                    <input type="text" name="aadhaar_last_4" maxlength="4" class="w-full px-4 py-2 border border-gray-300 rounded focus:outline-none focus:ring-2 focus:ring-blue-600" placeholder="XXXX">
                </div>
                
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-2">Village</label>
                    <input type="text" name="village" class="w-full px-4 py-2 border border-gray-300 rounded focus:outline-none focus:ring-2 focus:ring-blue-600" placeholder="Village Name">
                </div>
            </div>
            
            <div>
                <label class="block text-sm font-bold text-gray-700 mb-2">Address</label>
                <textarea name="address" rows="3" class="w-full px-4 py-2 border border-gray-300 rounded focus:outline-none focus:ring-2 focus:ring-blue-600" placeholder="Full Address"></textarea>
            </div>
            
            <div>
                <label class="block text-sm font-bold text-gray-700 mb-2">Notes</label>
                <textarea name="notes" rows="3" class="w-full px-4 py-2 border border-gray-300 rounded focus:outline-none focus:ring-2 focus:ring-blue-600" placeholder="Additional notes"></textarea>
            </div>
            
            <div class="flex gap-4">
                <button type="submit" class="px-6 py-2 bg-blue-600 text-white rounded font-bold hover:bg-blue-700 transition">
                    Add Customer
                </button>
                <a href="{{ url_for('customer.list_customers') }}" class="px-6 py-2 bg-gray-600 text-white rounded font-bold hover:bg-gray-700 transition">
                    Cancel
                </a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
