{% extends 'base.html' %}

{% block title %}Admin Login - CyberCafe ERP{% endblock %}
{% block page_title %}Admin Login{% endblock %}

{% block content %}
<div class="flex items-center justify-center min-h-screen bg-gray-100">
    <div class="bg-white rounded-lg card-shadow p-8 w-full max-w-md border-2 border-red-600">
        <h2 class="text-3xl font-bold text-center mb-2 text-red-600">Admin Panel</h2>
        <p class="text-center text-gray-600 mb-8">Secure Administrator Access</p>
        
        <form method="POST" class="space-y-6">
            <div>
                <label class="block text-sm font-bold text-gray-700 mb-2">Email Address</label>
                <input type="email" name="email" required class="w-full px-4 py-2 border border-gray-300 rounded focus:outline-none focus:ring-2 focus:ring-red-600" placeholder="admin@email.com">
            </div>
            
            <div>
                <label class="block text-sm font-bold text-gray-700 mb-2">Password</label>
                <input type="password" name="password" required class="w-full px-4 py-2 border border-gray-300 rounded focus:outline-none focus:ring-2 focus:ring-red-600" placeholder="••••••">
            </div>
            
            <button type="submit" class="w-full py-2 px-4 bg-red-600 text-white rounded font-bold hover:bg-red-700 transition">
                Login to Admin Panel
            </button>
        </form>
        
        <p class="text-center text-gray-600 mt-6 text-sm">
            This is a secured area. Unauthorized access is prohibited.
        </p>
    </div>
</div>
{% endblock %}
